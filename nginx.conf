# Instant Mail API - nginx 安全配置示例
# 将此配置合并到你的 nginx server {} 块中

# 阻止直接访问 cache/ 目录（emails.json、domains.json 含敏感数据）
location ~* /cache/ {
    deny all;
    return 403;
}

# 阻止访问测试/调试脚本
location ~* /(debug|test)_.*\.php$ {
    deny all;
    return 403;
}

# 阻止访问敏感文件
location ~* \.(log|txt|md|json|ini|yml|yaml)$ {
    deny all;
    return 403;
}

# 阻止访问配置文件和 SDK
location ~* /(config|InstantMailAPI)\.php$ {
    deny all;
    return 403;
}

# 禁止目录列表
autoindex off;

# PHP 处理
location ~ \.php$ {
    fastcgi_pass 127.0.0.1:9000;  # 根据你的 PHP-FPM 配置调整
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
